<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Markazi</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root{--bg:#0d0d0f;--surface:#16161a;--border:#2a2a32;--accent:#c9a84c;--accent2:#e8c96a;--text:#e8e8e0;--muted:#7a7a88;--correct:#4caf88;--wrong:#e05c5c;--correct-bg:#1a2e28;--wrong-bg:#2e1a1a;--blue:#5b8dee;--blue2:#7aa3f5;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;}
.container{width:100%;max-width:720px;position:relative;}
header{text-align:center;padding:40px 0 30px;}
header .eyebrow{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
header h1{font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,42px);font-weight:900;line-height:1.1;}
header h1 span{color:var(--accent);}
.subjects{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:30px;}
.subject-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 20px;cursor:pointer;transition:all 0.2s;text-align:center;}
.subject-card:hover{transform:translateY(-3px);}
.din:hover{border-color:var(--accent);box-shadow:0 8px 24px rgba(201,168,76,0.15);}
.english:hover{border-color:var(--blue);box-shadow:0 8px 24px rgba(91,141,238,0.15);}
.subject-card .icon{font-size:36px;margin-bottom:12px;}
.subject-card .sname{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:6px;}
.subject-card .count{font-size:12px;color:var(--muted);letter-spacing:1px;}
.din .sname{color:var(--accent);}
.english .sname{color:var(--blue);}
.start-box{text-align:center;padding:10px 0 30px;}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;cursor:pointer;margin-bottom:20px;background:none;border:none;font-family:'IBM Plex Sans',sans-serif;}
.back-btn:hover{color:var(--text);}
.start-box p{color:var(--muted);font-size:15px;line-height:1.7;margin-bottom:24px;}
.shuffle-toggle{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px;font-size:14px;color:var(--muted);cursor:pointer;}
.toggle{width:40px;height:22px;background:var(--border);border-radius:11px;position:relative;transition:background 0.2s;}
.toggle.on{background:var(--accent);}
.toggle.on.blue{background:var(--blue);}
.toggle::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform 0.2s;}
.toggle.on::after{transform:translateX(18px);}
.btn-start{padding:18px 50px;background:var(--accent);color:#0d0d0f;border:none;border-radius:12px;font-family:'IBM Plex Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:1px;}
.btn-start:hover{background:var(--accent2);transform:translateY(-2px);}
.btn-start.blue-btn{background:var(--blue);color:#fff;}
.btn-start.blue-btn:hover{background:var(--blue2);}
.stats-bar{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 20px;margin-bottom:24px;}
.stat{display:flex;flex-direction:column;align-items:center;gap:3px;}
.stat-label{color:var(--muted);font-size:10px;letter-spacing:2px;text-transform:uppercase;}
.stat-value{font-weight:600;font-size:20px;}
.sv-correct{color:var(--correct);}
.sv-wrong{color:var(--wrong);}
.sv-accent{color:var(--accent);}
.sv-blue{color:var(--blue);}
.progress-wrap{height:3px;background:var(--border);border-radius:2px;margin-bottom:28px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 0.4s ease;}
.progress-bar.blue{background:linear-gradient(90deg,var(--blue),var(--blue2));}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:30px;margin-bottom:20px;animation:slideIn 0.35s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.q-number{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.q-text{font-size:17px;line-height:1.65;color:var(--text);margin-bottom:24px;}
.options{display:flex;flex-direction:column;gap:10px;}
.option{display:flex;align-items:flex-start;gap:14px;padding:14px 18px;background:var(--bg);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all 0.18s ease;text-align:left;color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:15px;line-height:1.5;}
.option:hover:not(.disabled){background:#1a1a20;transform:translateX(3px);}
.din-opt:hover:not(.disabled){border-color:var(--accent);}
.eng-opt:hover:not(.disabled){border-color:var(--blue);}
.option .letter{min-width:26px;height:26px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--muted);flex-shrink:0;transition:all 0.18s;}
.din-opt:hover:not(.disabled) .letter{background:var(--accent);color:#000;}
.eng-opt:hover:not(.disabled) .letter{background:var(--blue);color:#fff;}
.option.correct{border-color:var(--correct);background:var(--correct-bg);}
.option.correct .letter{background:var(--correct);color:#fff;}
.option.wrong{border-color:var(--wrong);background:var(--wrong-bg);}
.option.wrong .letter{background:var(--wrong);color:#fff;}
.option.disabled{cursor:default;}
.feedback{display:none;margin-top:16px;padding:12px 16px;border-radius:8px;font-size:14px;font-weight:500;}
.feedback.correct{display:flex;background:var(--correct-bg);color:var(--correct);border:1px solid var(--correct);gap:8px;align-items:center;}
.feedback.wrong{display:flex;background:var(--wrong-bg);color:#ff8a8a;border:1px solid var(--wrong);gap:8px;align-items:center;}
.btn-next{display:none;width:100%;padding:16px;background:var(--accent);color:#0d0d0f;border:none;border-radius:10px;font-family:'IBM Plex Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.18s;margin-top:16px;}
.btn-next:hover{transform:translateY(-1px);}
.btn-next.blue-btn{background:var(--blue);color:#fff;}
.btn-next.blue-btn:hover{background:var(--blue2);}
.result-screen{display:none;text-align:center;padding:50px 20px;animation:slideIn 0.4s ease;}
.big-score{font-family:'Playfair Display',serif;font-size:90px;font-weight:900;line-height:1;margin-bottom:8px;}
.score-label{color:var(--muted);font-size:14px;letter-spacing:3px;text-transform:uppercase;margin-bottom:30px;}
.result-msg{font-size:22px;font-family:'Playfair Display',serif;margin-bottom:10px;}
.result-sub{color:var(--muted);font-size:15px;margin-bottom:40px;}
.result-stats{display:flex;justify-content:center;gap:20px;margin-bottom:40px;flex-wrap:wrap;}
.result-stat{padding:20px 24px;background:var(--surface);border:1px solid var(--border);border-radius:12px;}
.result-stat .n{font-size:32px;font-weight:700;}
.result-stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-top:4px;}
.btn-group{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-restart{padding:16px 32px;background:transparent;color:var(--accent);border:2px solid var(--accent);border-radius:10px;font-family:'IBM Plex Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn-restart:hover{background:var(--accent);color:#000;}
.btn-home{padding:16px 32px;background:transparent;color:var(--muted);border:2px solid var(--border);border-radius:10px;font-family:'IBM Plex Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn-home:hover{border-color:var(--text);color:var(--text);}
footer{text-align:center;color:var(--muted);font-size:12px;padding:30px 0 20px;}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="eyebrow">O'zbekiston · Ta'lim</div>
    <h1>Test <span>Markazi</span></h1>
  </header>

  <div id="subjectScreen">
    <div class="subjects">
      <div class="subject-card din" onclick="showStart('din')">
        <div class="icon">🕌</div>
        <div class="sname">Dinshunoslik</div>
        <div class="count">54 SAVOL</div>
      </div>
      <div class="subject-card english" onclick="showStart('english')">
        <div class="icon">🇬🇧</div>
        <div class="sname">Ingliz tili</div>
        <div class="count">293 SAVOL</div>
      </div>
    </div>
  </div>

  <div id="startScreen" style="display:none;">
    <div class="start-box">
      <button class="back-btn" onclick="goHome()">← Orqaga</button>
      <p id="startDesc"></p>
      <div class="shuffle-toggle" onclick="toggleShuffle()">
        <div class="toggle on" id="shuffleToggle"></div>
        <span id="shuffleLabel">Savollarni aralashtirish: Yoqilgan</span>
      </div>
      <button class="btn-start" id="startBtn" onclick="startQuiz()">Testni Boshlash →</button>
    </div>
  </div>

  <div id="quizScreen" style="display:none;">
    <div class="stats-bar">
      <div class="stat"><span class="stat-label">Savol</span><span class="stat-value sv-accent" id="qCounter">1/1</span></div>
      <div class="stat"><span class="stat-label">To'g'ri</span><span class="stat-value sv-correct" id="correctCount">0</span></div>
      <div class="stat"><span class="stat-label">Noto'g'ri</span><span class="stat-value sv-wrong" id="wrongCount">0</span></div>
      <div class="stat"><span class="stat-label">Ball</span><span class="stat-value sv-accent" id="scorePercent">0%</span></div>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="card" id="questionCard">
      <div class="q-number" id="qNumber">SAVOL 1</div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="optionsContainer"></div>
      <div class="feedback" id="feedback"></div>
      <button class="btn-next" id="nextBtn" onclick="nextQuestion()">Keyingi savol →</button>
    </div>
  </div>

  <div class="result-screen" id="resultScreen">
    <div class="big-score" id="finalScore">0%</div>
    <div class="score-label">Yakuniy natija</div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="result-sub" id="resultSub"></div>
    <div class="result-stats">
      <div class="result-stat"><div class="n sv-correct" id="rCorrect">0</div><div class="l">To'g'ri</div></div>
      <div class="result-stat"><div class="n sv-wrong" id="rWrong">0</div><div class="l">Noto'g'ri</div></div>
      <div class="result-stat"><div class="n sv-accent" id="rTotal">0</div><div class="l">Jami</div></div>
    </div>
    <div class="btn-group">
      <button class="btn-home" onclick="goHome()">🏠 Bosh sahifa</button>
      <button class="btn-restart" onclick="restartQuiz()">↺ Qayta boshlash</button>
    </div>
  </div>

  <footer>Test Markazi · Dinshunoslik & Ingliz tili</footer>
</div>
<script>

let currentSubject=null,questions=[],current=0,correct=0,wrong=0,answered=false,shuffleOn=true;
function goHome(){
  document.getElementById('subjectScreen').style.display='block';
  ['startScreen','quizScreen','resultScreen'].forEach(id=>document.getElementById(id).style.display='none');
}
function showStart(s){
  currentSubject=s;
  document.getElementById('subjectScreen').style.display='none';
  document.getElementById('startScreen').style.display='block';
  const isE=s==='english';
  document.getElementById('startDesc').textContent=isE?'Ingliz tili bo\'yicha 293 ta test savoli. Grammatika, leksika, prepositions, vaqt va boshqalar.':'Dinshunoslik fanidan 80+ test savoli. Har safar savollar aralashtiriladi.';
  document.getElementById('startBtn').className='btn-start'+(isE?' blue-btn':'');
  document.getElementById('shuffleToggle').className='toggle on'+(isE?' blue':'');
}
function toggleShuffle(){
  shuffleOn=!shuffleOn;
  const isE=currentSubject==='english';
  document.getElementById('shuffleToggle').className='toggle'+(shuffleOn?' on':'')+(isE?' blue':'');
  document.getElementById('shuffleLabel').textContent='Savollarni aralashtirish: '+(shuffleOn?'Yoqilgan':"O\'chirilgan");
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startQuiz(){
  const pool=currentSubject==='english'?engQuestions:dinQuestions;
  questions=shuffleOn?shuffle([...pool]):[...pool];
  current=0;correct=0;wrong=0;
  document.getElementById('startScreen').style.display='none';
  document.getElementById('quizScreen').style.display='block';
  const isE=currentSubject==='english';
  document.getElementById('progressBar').className='progress-bar'+(isE?' blue':'');
  document.getElementById('qCounter').className='stat-value '+(isE?'sv-blue':'sv-accent');
  document.getElementById('scorePercent').className='stat-value '+(isE?'sv-blue':'sv-accent');
  renderQuestion();
}
function renderQuestion(){
  answered=false;
  const q=questions[current],total=questions.length,isE=currentSubject==='english';
  document.getElementById('qCounter').textContent=`${current+1}/${total}`;
  document.getElementById('correctCount').textContent=correct;
  document.getElementById('wrongCount').textContent=wrong;
  document.getElementById('scorePercent').textContent=(current>0?Math.round(correct/current*100):0)+'%';
  document.getElementById('progressBar').style.width=((current/total)*100)+'%';
  document.getElementById('qNumber').textContent='SAVOL '+(current+1);
  document.getElementById('qText').textContent=q.q;
  let idx=[0,1,2,3];if(shuffleOn)idx=shuffle(idx);
  const container=document.getElementById('optionsContainer');
  container.innerHTML='';
  idx.forEach((orig,disp)=>{
    const btn=document.createElement('button');
    btn.className='option '+(isE?'eng-opt':'din-opt');
    btn.dataset.isCorrect=(orig===q.a)?'1':'0';
    btn.innerHTML=`<span class="letter">${['A','B','C','D'][disp]}</span><span>${q.o[orig]}</span>`;
    btn.onclick=()=>selectOption(btn);
    container.appendChild(btn);
  });
  document.getElementById('feedback').className='feedback';
  document.getElementById('feedback').textContent='';
  const nb=document.getElementById('nextBtn');
  nb.style.display='none';
  nb.className='btn-next'+(isE?' blue-btn':'');
  const card=document.getElementById('questionCard');
  card.style.animation='none';card.offsetHeight;card.style.animation='slideIn 0.35s ease';
}
function selectOption(btn){
  if(answered)return;answered=true;
  document.querySelectorAll('.option').forEach(o=>o.classList.add('disabled'));
  const ok=btn.dataset.isCorrect==='1';
  if(ok){btn.classList.add('correct');correct++;}
  else{btn.classList.add('wrong');wrong++;document.querySelectorAll('.option').forEach(o=>{if(o.dataset.isCorrect==='1')o.classList.add('correct');});}
  const fb=document.getElementById('feedback');
  fb.className='feedback '+(ok?'correct':'wrong');
  fb.innerHTML=ok?"✓ To\'g\'ri javob!":"✗ Noto\'g\'ri. To\'g\'ri javob yashil bilan ko\'rsatildi.";
  document.getElementById('scorePercent').textContent=Math.round(correct/(current+1)*100)+'%';
  document.getElementById('correctCount').textContent=correct;
  document.getElementById('wrongCount').textContent=wrong;
  document.getElementById('nextBtn').style.display='block';
}
function nextQuestion(){current++;if(current>=questions.length)showResult();else renderQuestion();}
function showResult(){
  document.getElementById('quizScreen').style.display='none';
  const s=document.getElementById('resultScreen');s.style.display='block';
  const total=questions.length,pct=Math.round(correct/total*100);
  const sc=document.getElementById('finalScore');
  sc.textContent=pct+'%';sc.style.color=currentSubject==='english'?'var(--blue)':'var(--accent)';
  document.getElementById('rCorrect').textContent=correct;
  document.getElementById('rWrong').textContent=wrong;
  document.getElementById('rTotal').textContent=total;
  let msg,sub;
  if(pct>=90){msg="A'lo natija! 🏆";sub="Mukammal bilimlar!";}
  else if(pct>=75){msg="Yaxshi natija! 👍";sub="Ko'p savollarni to'g'ri javobladingiz.";}
  else if(pct>=60){msg="Qoniqarli natija";sub="Bilimlaringizni mustahkamlash kerak.";}
  else{msg="Yana bir urinib ko'ring";sub="O'qib, qaytadan sinab ko'ring!";}
  document.getElementById('resultMsg').textContent=msg;
  document.getElementById('resultSub').textContent=sub;
}
function restartQuiz(){document.getElementById('resultScreen').style.display='none';showStart(currentSubject);}
